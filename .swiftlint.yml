included:
  - Package.swift
  - Sources
  - Tests

excluded:
  - .build
  - .home
  - dist
  - design

disabled_rules:
  - todo
  - opening_brace
  - trailing_comma

opt_in_rules:
  - empty_count
  - redundant_nil_coalescing
  - sorted_imports
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

line_length:
  warning: 140
  error: 180
  ignores_comments: true

type_body_length:
  warning: 400
  error: 500

file_length:
  warning: 800
  error: 1000

function_body_length:
  warning: 120
  error: 160

cyclomatic_complexity:
  warning: 20
  error: 30

identifier_name:
  min_length: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y
    - db
    - SQLITE_TRANSIENT
