name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  quality:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run quality pipeline
        uses: ./.github/actions/quality

  release:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]') }}
    needs: quality
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Verify Apple Silicon runner
        run: |
          test "$(uname -m)" = "arm64"
          sw_vers

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Determine next release
        id: release_meta
        run: ./scripts/determine_release.sh

      - name: Stop when no releasable changes are present
        if: steps.release_meta.outputs.should_release != 'true'
        run: echo "No releasable Conventional Commits found since the latest tag."

      - name: Update version and changelog
        if: steps.release_meta.outputs.should_release == 'true'
        run: ./scripts/update_changelog.sh "${{ steps.release_meta.outputs.version }}" "${{ steps.release_meta.outputs.notes_path }}"

      - name: Package release artifacts
        if: steps.release_meta.outputs.should_release == 'true'
        run: ./scripts/prepare_release.sh "${{ steps.release_meta.outputs.version }}" "${{ github.run_number }}"
        env:
          APPLE_DEVELOPER_ID_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}

      - name: Commit release metadata
        if: steps.release_meta.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.txt CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No release metadata changes to commit."
            exit 0
          fi

          git commit -m "chore(release): ${{ steps.release_meta.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Publish GitHub release
        if: steps.release_meta.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release_meta.outputs.version }}
          TAG: ${{ steps.release_meta.outputs.tag }}
          NOTES_PATH: ${{ steps.release_meta.outputs.notes_path }}
        run: |
          APP_ARCHIVE_PATH="dist/yc.clipboard-$VERSION.zip"
          APP_DMG_PATH="dist/yc.clipboard-$VERSION.dmg"
          TARGET_SHA="$(git rev-parse HEAD)"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "yc.clipboard $VERSION" --notes-file "$NOTES_PATH"
            gh release upload "$TAG" "$APP_ARCHIVE_PATH" "$APP_DMG_PATH" --clobber
          else
            gh release create "$TAG" "$APP_ARCHIVE_PATH" "$APP_DMG_PATH" \
              --title "yc.clipboard $VERSION" \
              --notes-file "$NOTES_PATH" \
              --target "$TARGET_SHA"
          fi
